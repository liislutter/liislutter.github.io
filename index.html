<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Y2K Dreamscape</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#f5f2f5;
    font-family:Arial, sans-serif;
    cursor:none;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}

/* dreamy haze */

.overlay{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,180,220,.18), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(160,255,240,.14), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(255,220,180,.15), transparent 35%);
    mix-blend-mode:screen;
}

/* grain */

.grain{
    position:fixed;
    inset:0;
    opacity:.05;
    pointer-events:none;
    background-image:
        radial-gradient(#fff 1px, transparent 1px);
    background-size:4px 4px;
    mix-blend-mode:overlay;
}

/* floating text */

.logo{
    position:fixed;
    top:24px;
    left:50%;
    transform:translateX(-50%);
    color:rgba(255,255,255,.75);
    letter-spacing:10px;
    font-size:12px;
    text-transform:uppercase;
    text-shadow:0 0 14px rgba(255,255,255,.8);
    pointer-events:none;
}

/* soft cursor */

.cursor{
    position:fixed;
    width:140px;
    height:140px;
    border-radius:50%;
    pointer-events:none;
    background:
        radial-gradient(circle,
        rgba(255,255,255,.55) 0%,
        rgba(255,255,255,.15) 40%,
        transparent 70%);
    mix-blend-mode:screen;
    transform:translate(-50%,-50%);
    filter:blur(8px);
}

</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="overlay"></div>
<div class="grain"></div>
<div class="logo">Y2K DREAM</div>
<div class="cursor" id="cursor"></div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w,h;

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

const mouse = {
    x:w/2,
    y:h/2
};

const cursor = document.getElementById("cursor");

window.addEventListener("mousemove",(e)=>{

    mouse.x = e.clientX;
    mouse.y = e.clientY;

    cursor.style.left = mouse.x + "px";
    cursor.style.top = mouse.y + "px";
});

/* aesthetic palette */

const colors = [
    "#ffb6d9",
    "#ffc6a8",
    "#ffe6ff",
    "#b6fff0",
    "#a9d7ff",
    "#fff0b3"
];

/* background floating cards */

const cards = [];

for(let i=0;i<16;i++){

    cards.push({
        x:Math.random()*w,
        y:Math.random()*h,
        width:80 + Math.random()*90,
        height:110 + Math.random()*100,
        color:colors[Math.floor(Math.random()*colors.length)],
        speed:0.2 + Math.random()*0.5,
        angle:Math.random()*Math.PI*2
    });

}

/* flowers */

class Flower{

    constructor(x,y,size,color){

        this.baseX = x;
        this.baseY = y;

        this.x = x;
        this.y = y;

        this.size = size;
        this.color = color;

        this.floatOffset = Math.random()*1000;
        this.rotation = Math.random()*6;

        this.petals = 6 + Math.floor(Math.random()*3);

        this.vx = 0;
        this.vy = 0;
    }

    update(time){

        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;

        const dist = Math.sqrt(dx*dx + dy*dy);

        const force = Math.max(0, 240 - dist);

        /* more fluid water movement */

        this.vx += (dx/dist) * force * 0.015;
        this.vy += (dy/dist) * force * 0.015;

        this.vx *= 0.92;
        this.vy *= 0.92;

        const floatX =
            Math.sin(time*0.001 + this.floatOffset) * 18;

        const floatY =
            Math.cos(time*0.0012 + this.floatOffset) * 18;

        this.x += ((this.baseX + floatX) - this.x) * 0.02;
        this.y += ((this.baseY + floatY) - this.y) * 0.02;

        this.x += this.vx * 0.08;
        this.y += this.vy * 0.08;
    }

    draw(time){

        ctx.save();

        ctx.translate(this.x,this.y);

        ctx.rotate(
            Math.sin(time*0.001 + this.floatOffset)*0.8
        );

        ctx.shadowBlur = 35;
        ctx.shadowColor = this.color;

        /* jelly flower effect */

        for(let i=0;i<this.petals;i++){

            ctx.save();

            const angle =
                (Math.PI*2/this.petals)*i;

            ctx.rotate(angle);

            const stretch =
                1 +
                Math.sin(time*0.005 + i + this.floatOffset)*0.35;

            const gradient = ctx.createRadialGradient(
                0,
                -this.size*0.4,
                0,
                0,
                -this.size*0.4,
                this.size
            );

            gradient.addColorStop(0,"rgba(255,255,255,.95)");
            gradient.addColorStop(1,this.color);

            ctx.fillStyle = gradient;

            ctx.beginPath();

            ctx.ellipse(
                0,
                -this.size*0.7,
                this.size*0.42*stretch,
                this.size,
                0,
                0,
                Math.PI*2
            );

            ctx.fill();

            ctx.restore();
        }

        /* center */

        const centerGradient = ctx.createRadialGradient(
            0,0,0,
            0,0,this.size*0.45
        );

        centerGradient.addColorStop(0,"#ffffff");
        centerGradient.addColorStop(1,"#fff0a8");

        ctx.fillStyle = centerGradient;

        ctx.beginPath();
        ctx.arc(0,0,this.size*0.32,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

const flowers = [];

for(let i=0;i<28;i++){

    flowers.push(
        new Flower(
            Math.random()*w,
            Math.random()*h,
            24 + Math.random()*34,
            colors[Math.floor(Math.random()*colors.length)]
        )
    );
}

/* draw dreamy background */

function background(time){

    const bg = ctx.createLinearGradient(
        0,0,w,h
    );

    bg.addColorStop(
        0,
        `hsl(${(time*0.01)%360},60%,92%)`
    );

    bg.addColorStop(
        .5,
        `hsl(${(time*0.02+120)%360},55%,90%)`
    );

    bg.addColorStop(
        1,
        `hsl(${(time*0.015+220)%360},65%,93%)`
    );

    ctx.fillStyle = bg;
    ctx.fillRect(0,0,w,h);

    /* floating image-card vibe */

    cards.forEach((card,index)=>{

        const x =
            card.x +
            Math.sin(time*0.0002 + index)*40;

        const y =
            card.y +
            Math.cos(time*0.0003 + index)*40;

        ctx.save();

        ctx.translate(x,y);

        ctx.rotate(
            Math.sin(time*0.0004 + index)*0.08
        );

        ctx.fillStyle = card.color;

        ctx.globalAlpha = 0.18;

        ctx.shadowBlur = 20;
        ctx.shadowColor = card.color;

        ctx.fillRect(
            -card.width/2,
            -card.height/2,
            card.width,
            card.height
        );

        ctx.restore();
    });
}

function animate(time){

    ctx.clearRect(0,0,w,h);

    background(time);

    flowers.forEach(flower=>{

        flower.update(time);
        flower.draw(time);

    });

    requestAnimationFrame(animate);
}

animate(0);

</script>

</body>
</html>
