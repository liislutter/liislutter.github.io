<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Floral Swirl Interactive Background</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html,body{
        width:100%;
        height:100%;
        overflow:hidden;
        background:#f3dfd2;
        font-family:Arial, sans-serif;
    }

    canvas{
        display:block;
    }

    .hint{
        position:fixed;
        bottom:20px;
        left:50%;
        transform:translateX(-50%);
        color:rgba(60,30,40,.65);
        letter-spacing:2px;
        font-size:12px;
        text-transform:uppercase;
        pointer-events:none;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="hint">Hover over the flowers ✨</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;
let mouse = {
    x: -9999,
    y: -9999
};

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener("mouseleave", () => {
    mouse.x = -9999;
    mouse.y = -9999;
});

const flowers = [
    { x: w * 0.72, y: h * 0.18, r: 90, petals: 5 },
    { x: w * 0.45, y: h * 0.24, r: 50, petals: 5 },
    { x: w * 0.62, y: h * 0.42, r: 58, petals: 5 }
];

const sparkles = [];

function drawBackground() {
    let grad = ctx.createLinearGradient(0,0,w,h);
    grad.addColorStop(0,"#f0d2dc");
    grad.addColorStop(0.45,"#f5c8d7");
    grad.addColorStop(1,"#f3e4d2");

    ctx.fillStyle = grad;
    ctx.fillRect(0,0,w,h);
}

function drawSwirls() {

    ctx.save();
    ctx.lineWidth = 3;
    ctx.strokeStyle = "rgba(70,20,40,.35)";

    const swirlSets = [
        {x: w*0.65, y: h*0.15, scale: 1},
        {x: w*0.35, y: h*0.45, scale: 1.2},
        {x: w*0.8, y: h*0.35, scale: 0.9},
        {x: w*0.18, y: h*0.18, scale: 1.4}
    ];

    swirlSets.forEach(s => {
        for(let i=0;i<6;i++){
            ctx.beginPath();

            for(let t=0;t<Math.PI*4;t+=0.1){
                let radius = 2 + t * 6 * s.scale;
                let x = s.x + Math.cos(t + i) * radius;
                let y = s.y + Math.sin(t + i) * radius;
                if(t === 0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }

            ctx.stroke();
        }
    });

    ctx.restore();
}

function drawInkSplashes() {
    for(let i=0;i<80;i++){
        ctx.beginPath();
        let x = Math.random()*w;
        let y = Math.random()*h*0.7;
        let r = Math.random()*3;

        ctx.fillStyle = `rgba(40,0,20,${Math.random()*0.25})`;
        ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fill();
    }
}

function petal(x, y, r, rot, color1, color2) {

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(rot);

    let grad = ctx.createRadialGradient(0,-r*0.2,5,0,0,r);
    grad.addColorStop(0,color1);
    grad.addColorStop(1,color2);

    ctx.beginPath();
    ctx.moveTo(0,0);

    ctx.bezierCurveTo(
        r*0.4,-r*0.2,
        r*0.7,-r*0.9,
        0,-r
    );

    ctx.bezierCurveTo(
        -r*0.7,-r*0.9,
        -r*0.4,-r*0.2,
        0,0
    );

    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = "rgba(25,0,20,.8)";
    ctx.lineWidth = 2;
    ctx.stroke();

    for(let i=0;i<6;i++){
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(
            Math.sin(i*0.2)*r*0.12,
            -r*0.7 + i*6
        );
        ctx.strokeStyle = "rgba(60,0,30,.25)";
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    ctx.restore();
}

function drawFlower(f) {

    let dx = mouse.x - f.x;
    let dy = mouse.y - f.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    let hover = dist < f.r + 40;

    let offsetX = hover ? dx * -0.015 : 0;
    let offsetY = hover ? dy * -0.015 : 0;
    let pulse = hover ? Math.sin(Date.now()*0.01)*4 : 0;

    ctx.save();
    ctx.translate(offsetX, offsetY);

    for(let i=0;i<f.petals;i++){
        petal(
            f.x,
            f.y,
            f.r + pulse,
            (Math.PI*2/f.petals)*i,
            "#f7dbe7",
            "#9d647c"
        );
    }

    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r*0.16, 0, Math.PI*2);
    ctx.fillStyle = "#f8eef1";
    ctx.fill();

    ctx.strokeStyle = "#3b1122";
    ctx.lineWidth = 2;
    ctx.stroke();

    for(let i=0;i<16;i++){
        let angle = (Math.PI*2/16)*i;
        let rx = f.x + Math.cos(angle)*f.r*0.18;
        let ry = f.y + Math.sin(angle)*f.r*0.18;

        ctx.beginPath();
        ctx.arc(rx,ry,2,0,Math.PI*2);
        ctx.fillStyle = "#5d1f35";
        ctx.fill();
    }

    ctx.restore();

    if(hover && Math.random() < 0.5){
        sparkles.push({
            x: f.x + (Math.random()-0.5)*f.r,
            y: f.y + (Math.random()-0.5)*f.r,
            size: Math.random()*4+1,
            life: 1
        });
    }
}

function drawSparkles() {

    for(let i=sparkles.length-1;i>=0;i--){

        const s = sparkles[i];

        ctx.save();
        ctx.translate(s.x,s.y);

        ctx.strokeStyle = `rgba(255,255,255,${s.life})`;
        ctx.lineWidth = 1.5;

        ctx.beginPath();
        ctx.moveTo(-s.size,0);
        ctx.lineTo(s.size,0);
        ctx.moveTo(0,-s.size);
        ctx.lineTo(0,s.size);
        ctx.stroke();

        ctx.restore();

        s.life -= 0.03;
        s.size += 0.05;

        if(s.life <= 0){
            sparkles.splice(i,1);
        }
    }
}

function animate() {

    ctx.clearRect(0,0,w,h);

    drawBackground();
    drawSwirls();
    drawInkSplashes();

    flowers.forEach(drawFlower);

    drawSparkles();

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
