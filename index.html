<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pastel Y2K Flowers</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html,body{
        width:100%;
        height:100%;
        overflow:hidden;
        background:#f7d8ff;
        font-family:Arial, sans-serif;
        cursor:none;
    }

    canvas{
        display:block;
        width:100%;
        height:100%;
    }

    .grain{
        position:fixed;
        inset:0;
        pointer-events:none;
        opacity:.08;
        background-image:
            radial-gradient(circle at 20% 20%, #fff 0 1px, transparent 1px),
            radial-gradient(circle at 80% 40%, #fff 0 1px, transparent 1px),
            radial-gradient(circle at 30% 70%, #fff 0 1px, transparent 1px);
        background-size:180px 180px;
        mix-blend-mode:overlay;
        animation:grainMove 12s linear infinite;
    }

    @keyframes grainMove{
        from{ transform:translate(0,0);}
        to{ transform:translate(-100px,-80px);}
    }

    .title{
        position:fixed;
        top:24px;
        left:50%;
        transform:translateX(-50%);
        color:white;
        font-size:14px;
        letter-spacing:4px;
        text-transform:uppercase;
        opacity:.75;
        text-shadow:0 0 12px rgba(255,255,255,.6);
        pointer-events:none;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="grain"></div>
<div class="title">Pastel Flower Dream</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const mouse = {
    x: w / 2,
    y: h / 2
};

window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

const pastelColors = [
    "#ffb3d9",
    "#ffd6a5",
    "#fdffb6",
    "#caffbf",
    "#a0c4ff",
    "#bdb2ff",
    "#ffc6ff"
];

class Flower{
    constructor(x,y,size,color){
        this.x = x;
        this.y = y;
        this.baseX = x;
        this.baseY = y;
        this.size = size;
        this.color = color;
        this.angle = Math.random() * Math.PI * 2;
        this.floatOffset = Math.random() * 1000;
        this.petals = 6 + Math.floor(Math.random()*3);
    }

    draw(time){

        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        let influence = Math.max(0, 140 - dist);

        const waveX = Math.sin(time * 0.001 + this.floatOffset) * 8;
        const waveY = Math.cos(time * 0.0012 + this.floatOffset) * 8;

        this.x += ((this.baseX + waveX) - this.x) * 0.03;
        this.y += ((this.baseY + waveY) - this.y) * 0.03;

        const swayX = dx * influence * 0.0009;
        const swayY = dy * influence * 0.0009;

        ctx.save();
        ctx.translate(this.x + swayX, this.y + swayY);

        ctx.rotate(
            Math.sin(time * 0.001 + this.floatOffset) * 0.3
        );

        // glow
        ctx.shadowBlur = 25;
        ctx.shadowColor = this.color;

        // petals
        for(let i=0; i<this.petals; i++){

            const petalAngle = (Math.PI * 2 / this.petals) * i;

            const stretch =
                1 +
                Math.sin(time * 0.003 + i + this.floatOffset) * 0.15;

            ctx.save();
            ctx.rotate(petalAngle);

            const gradient = ctx.createRadialGradient(
                0,
                0,
                2,
                0,
                -this.size * 0.8,
                this.size
            );

            gradient.addColorStop(0, "#ffffff");
            gradient.addColorStop(1, this.color);

            ctx.fillStyle = gradient;

            ctx.beginPath();
            ctx.ellipse(
                0,
                -this.size * 0.7,
                this.size * 0.45 * stretch,
                this.size * 0.9,
                0,
                0,
                Math.PI * 2
            );
            ctx.fill();

            ctx.restore();
        }

        // center
        ctx.beginPath();
        ctx.fillStyle = "#fff8c6";
        ctx.arc(0,0,this.size*0.3,0,Math.PI*2);
        ctx.fill();

        ctx.restore();
    }
}

const flowers = [];

for(let i=0; i<42; i++){

    flowers.push(
        new Flower(
            Math.random() * w,
            Math.random() * h,
            20 + Math.random() * 30,
            pastelColors[
                Math.floor(Math.random() * pastelColors.length)
            ]
        )
    );
}

function drawBackground(time){

    const gradient = ctx.createLinearGradient(
        0,
        0,
        w,
        h
    );

    gradient.addColorStop(
        0,
        `hsl(${(time*0.01)%360}, 80%, 86%)`
    );

    gradient.addColorStop(
        0.5,
        `hsl(${(time*0.015 + 80)%360}, 85%, 88%)`
    );

    gradient.addColorStop(
        1,
        `hsl(${(time*0.01 + 180)%360}, 80%, 85%)`
    );

    ctx.fillStyle = gradient;
    ctx.fillRect(0,0,w,h);

    // dreamy blobs
    for(let i=0; i<6; i++){

        const x =
            w/2 +
            Math.sin(time*0.0002 + i) * w * 0.35;

        const y =
            h/2 +
            Math.cos(time*0.0003 + i) * h * 0.35;

        const radius =
            180 +
            Math.sin(time*0.001 + i) * 40;

        const blob = ctx.createRadialGradient(
            x,y,0,
            x,y,radius
        );

        blob.addColorStop(0,"rgba(255,255,255,0.14)");
        blob.addColorStop(1,"rgba(255,255,255,0)");

        ctx.fillStyle = blob;

        ctx.beginPath();
        ctx.arc(x,y,radius,0,Math.PI*2);
        ctx.fill();
    }
}

function animate(time){

    ctx.clearRect(0,0,w,h);

    drawBackground(time);

    flowers.forEach(flower => {
        flower.draw(time);
    });

    requestAnimationFrame(animate);
}

animate(0);
</script>

</body>
</html>
